<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script id="fetch-read-only-patch">
      (function() {
        var currentFetch = window.fetch;
        var patch = {
          get: function() { return currentFetch; },
          set: function(val) {
            console.warn("Atalhado override de fetch:", val);
            currentFetch = val;
          },
          configurable: true,
          enumerable: true
        };
        try {
          Object.defineProperty(window, 'fetch', patch);
        } catch (e) {
          console.warn("Patch window.fetch falhou:", e);
        }
        try {
          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            Object.defineProperty(globalThis, 'fetch', patch);
          }
        } catch (e) {
          console.warn("Patch globalThis.fetch falhou:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
